# Render Blueprint — syncs build/start commands for the API service.
# In the dashboard, connect this repo or set Root Directory to `server` manually.
services:
  - type: web
    name: stitch-ats-api
    runtime: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm run start:deploy
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "22.22.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
