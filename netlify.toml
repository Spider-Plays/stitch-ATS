[build]
  command = "npm run build:client"
  publish = "dist"

# Update YOUR-SERVICE-NAME after creating the Render web service
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-SERVICE-NAME.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
